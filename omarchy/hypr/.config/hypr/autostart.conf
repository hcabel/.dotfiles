$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$base = ~/.dotfiles/base/hypr/.config/hypr

# Services
exec = ~/.config/scripts/RainbowBorders.sh
exec = ~/.config/scripts/monitor-profile-apply.sh

# Apps
exec-once = [workspace 1] firefox # browser
exec-once = [workspace 2] kitty # terminal
exec-once = [workspace 4] discord
exec-once = ~/.local/share/omarchy/bin/omarchy-display-switcher

